name: Challenge 1

on: workflow_dispatch

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: setup
        run: |
          date
          pwd
          ls -la

  job2:
    runs-on: ubuntu-latest
    steps:
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: print python version
        run: python --version
      - name: set up pandas
        run: pip install pandas
      - name: create artefact
        run: |
          echo "print('Hello from my artifact')" > artifact.py
          python artifact.py