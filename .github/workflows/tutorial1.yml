name: Tutorial 1 Workflow

on: [push, pull_request]

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 of job 1
        run: echo "I am job 1"
      - name: Print date
        run: date
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Check Python version
        run: python --version
      - name: Check pip version
        run: pip --version

  job2:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 of job 2
        run: echo "I am job 2"
      - name: Print date
        run: date

  job3:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 of job 3
        run: |
          echo "I am job 3"
          echo "This is a multiline run block"
      - name: Print date
        run: date

  job4:
    needs: [job1, job2]
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 of job 4
        run: echo "I am job 4"